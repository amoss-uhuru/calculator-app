<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NeoCalc | Modern Standard Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <div class="theme-toggle">
            <i class="fas fa-sun"></i>
            <label class="switch">
                <input type="checkbox" id="themeSwitch">
                <span class="slider round"></span>
            </label>
            <i class="fas fa-moon"></i>
        </div>
        <div class="calculator">
            <div class="display-area">
                <div class="expression" id="expression">0</div>
                <div class="result" id="result"></div>
            </div>
            <div class="buttons">
                <!-- Row 1: AC, backspace, %, divide -->
                <button class="btn function" data-action="clear">AC</button>
                <button class="btn function" data-action="backspace"><i class="fas fa-backspace"></i></button>
                <button class="btn function" data-action="percent">%</button>
                <button class="btn operator" data-op="/">÷</button>

                <!-- Row 2: 7,8,9, multiply -->
                <button class="btn number" data-value="7">7</button>
                <button class="btn number" data-value="8">8</button>
                <button class="btn number" data-value="9">9</button>
                <button class="btn operator" data-op="*">×</button>

                <!-- Row 3: 4,5,6, subtract -->
                <button class="btn number" data-value="4">4</button>
                <button class="btn number" data-value="5">5</button>
                <button class="btn number" data-value="6">6</button>
                <button class="btn operator" data-op="-">−</button>

                <!-- Row 4: 1,2,3, add -->
                <button class="btn number" data-value="1">1</button>
                <button class="btn number" data-value="2">2</button>
                <button class="btn number" data-value="3">3</button>
                <button class="btn operator" data-op="+">+</button>

                <!-- Row 5: 0, ., negate, equals -->
                <button class="btn number" data-value="0">0</button>
                <button class="btn number" data-value=".">.</button>
                <button class="btn function" data-action="negate">±</button>
                <button class="btn equals" data-action="equals">=</button>
            </div>
        </div>
        <div class="history-panel">
            <div class="history-header">
                <h3><i class="fas fa-history"></i> History</h3>
                <button id="clearHistoryBtn" class="clear-history-btn">Clear</button>
            </div>
            <ul id="historyList">
                <li class="empty-history">No calculations yet</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
