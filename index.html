<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ProCalc | Advanced Scientific Calculator</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <div class="theme-toggle">
            <i class="fas fa-sun"></i>
            <label class="switch">
                <input type="checkbox" id="themeSwitch">
                <span class="slider round"></span>
            </label>
            <i class="fas fa-moon"></i>
        </div>
        <div class="calculator">
            <div class="display-area">
                <div class="expression" id="expression">0</div>
                <div class="result" id="result"></div>
            </div>
            <div class="buttons">
                <!-- Row 1: Special functions -->
                <button class="btn function" data-action="clear">AC</button>
                <button class="btn function" data-action="backspace"><i class="fas fa-backspace"></i></button>
                <button class="btn function" data-action="percent">%</button>
                <button class="btn function" data-action="divide">÷</button>
                <!-- Row 2 -->
                <button class="btn number" data-value="7">7</button>
                <button class="btn number" data-value="8">8</button>
                <button class="btn number" data-value="9">9</button>
                <button class="btn operator" data-op="*">×</button>
                <!-- Row 3 -->
                <button class="btn number" data-value="4">4</button>
                <button class="btn number" data-value="5">5</button>
                <button class="btn number" data-value="6">6</button>
                <button class="btn operator" data-op="-">−</button>
                <!-- Row 4 -->
                <button class="btn number" data-value="1">1</button>
                <button class="btn number" data-value="2">2</button>
                <button class="btn number" data-value="3">3</button>
                <button class="btn operator" data-op="+">+</button>
                <!-- Row 5 -->
                <button class="btn number" data-value="0">0</button>
                <button class="btn number" data-value=".">.</button>
                <button class="btn function" data-action="negate">±</button>
                <button class="btn equals" data-action="equals">=</button>
                <!-- Extra scientific row -->
                <button class="btn sci" data-action="sqrt">√</button>
                <button class="btn sci" data-action="square">x²</button>
                <button class="btn sci" data-action="reciprocal">1/x</button>
                <button class="btn sci" data-action="clear-history">📋</button>
            </div>
        </div>
        <div class="history-panel">
            <div class="history-header">
                <h3><i class="fas fa-history"></i> History</h3>
                <button id="clearHistoryBtn" class="clear-history-btn">Clear</button>
            </div>
            <ul id="historyList">
                <li class="empty-history">No calculations yet</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
